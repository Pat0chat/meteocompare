AutoName: MeteoCompare

Description: |-
    MeteoCompare interroge en parallèle 8 modèles météorologiques de référence
    (AROME, ARPEGE, ICON, GFS, ECMWF...) et calcule un indice de confiance
    basé sur leur convergence.

    Plutôt que d'afficher une prévision opaque, l'application montre où les
    modèles s'accordent et où ils divergent — la vraie information utile pour
    planifier sereinement vos activités extérieures.

    Fonctionnalités principales :

    * Comparaison de 8 modèles météo en parallèle
    * Indice de confiance pondéré par résolution
    * Bande de confiance horaire sur 7 jours
    * Cache local pour démarrage instantané et mode offline
    * Sélection personnalisée des modèles activés
    * Accessibilité TalkBack complète

    Vie privée :

    * Zéro collecte de données
    * Aucun analytics, aucun tracking, aucune publicité
    * Aucun identifiant publicitaire (AD_ID explicitement retiré)
    * Toutes les données restent sur votre appareil
    * Seul backend interrogé : Open-Meteo (FOSS, sans compte requis)

    Données fournies par Open-Meteo. Modèles : AROME et ARPEGE par
    Météo-France, ICON par DWD, GFS par NOAA, ECMWF par le Centre Européen.

